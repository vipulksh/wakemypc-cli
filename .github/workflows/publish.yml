# Publish wakemypc to PyPI on tag push.
#
# Companion to release.yml. release.yml fires on a push to main (or a
# tag push) and may or may not actually create a release -- it skips
# when RELEASE_NOTES.md hasn't been bumped. This workflow runs on
# release.yml's completion and decides whether there's anything new to
# publish:
#
#   - If no tag points at the commit that triggered release.yml,
#     nothing was released -> skip.
#   - If PyPI already has that version, it was published earlier -> skip.
#   - Otherwise build + upload.
#
# AUTHENTICATION: PyPI Trusted Publishing (OIDC).
# -------------------------------------------------
# This workflow uses PyPI's Trusted Publisher mechanism rather than an
# API token. No secret needs to be stored in this repo. Trust is
# established once on the PyPI side: in the "wakemypc" project's
# settings, add a publisher with these exact values:
#
#   PyPI Project Name:   wakemypc
#   Owner:               vipulksh
#   Repository name:     wakemypc-cli
#   Workflow filename:   publish.yml
#   Environment name:    pypi
#
# (https://docs.pypi.org/trusted-publishers/adding-a-publisher/)
#
# The `environment: pypi` declaration below is what binds the OIDC
# token GitHub mints to the publisher above. Without the environment
# match, PyPI rejects the publish even with valid OIDC.
#
# To switch back to API-token auth (simpler, less secure), delete the
# `permissions: id-token: write` line and the `environment` block,
# then add `password: ${{ secrets.PYPI_API_TOKEN }}` under the
# pypa/gh-action-pypi-publish step's `with:`.

name: Publish to PyPI

on:
  workflow_run:
    workflows: ["Release CLI"]   # must match name: in release.yml
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to publish (must match pyproject.toml version)'
        required: true

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    # Only run on workflow_dispatch, or on a successful Release CLI run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      tag: ${{ steps.gate.outputs.tag }}
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Decide whether to publish
        # Single combined gate so we only set `skip` in one place.
        # Skip cleanly (no error) if:
        #   - workflow_run trigger but no tag points at the released commit
        #     (Release CLI ran but didn't actually release anything), or
        #   - the version is already on PyPI.
        # Fail loudly if pyproject.toml and the tag disagree (real bug).
        id: gate
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag=$(git tag --points-at HEAD | grep '^v' | head -n 1 || true)
            if [ -z "${tag}" ]; then
              echo "No tag points at $(git rev-parse HEAD) -- Release CLI ran but did not release. Skipping."
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "tag=" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

          pkg_version=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "tag=${tag}  pyproject=v${pkg_version}"
          if [ "${tag}" != "v${pkg_version}" ]; then
            echo "::error::Tag ${tag} does not match pyproject.toml version ${pkg_version}"
            exit 1
          fi

          # Idempotency: if PyPI already has this version, don't re-publish.
          # `pip index versions` can be flaky; the JSON endpoint returns 200
          # for known versions and 404 otherwise.
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/wakemypc/${pkg_version}/json")
          if [ "${status}" = "200" ]; then
            echo "wakemypc ${pkg_version} is already on PyPI -- skipping."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "wakemypc ${pkg_version} not on PyPI (HTTP ${status}) -- proceeding."
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build distributions
        if: steps.gate.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts
        if: steps.gate.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.skip == 'false'
    runs-on: ubuntu-latest
    # The `pypi` environment is the one bound to the Trusted Publisher
    # on PyPI's side. If you also wire up a "TestPyPI" environment for
    # dry runs, add a second job that points at it.
    environment:
      name: pypi
      url: https://pypi.org/p/wakemypc
    permissions:
      # OIDC: GitHub mints a short-lived token that PyPI verifies
      # against the configured Trusted Publisher. No secret needed.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # `release/v1` is the canonical floating tag the pypa team
        # maintains; pinning to a specific SHA is stricter but means
        # we'd need to bump it on every action update.
