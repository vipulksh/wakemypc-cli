# Build sdist + wheel and cut a GitHub Release on tag push.
#
# When you push a tag like `v1.0.1`, this workflow:
#  1. Builds source distribution + wheel via `python -m build`.
#  2. Creates a GitHub Release using RELEASE_NOTES.md as the body.
#  3. Attaches the wheel and sdist as release assets.
#
# To release:
#   1. Bump version in pyproject.toml.
#   2. Edit RELEASE_NOTES.md with the changelog.
#   3. Commit, tag (e.g. `git tag v1.0.1`), push (`git push origin v1.0.1`).

name: Release CLI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Validate release notes
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"   # e.g. v1.0.5
          # Read first line and normalize:
          # - remove leading ##
          # - trim spaces
          # - remove CR (Windows line endings)
          first_line=$(head -n 1 RELEASE_NOTES.md | sed -E 's/^##[[:space:]]*//' | tr -d '\r')

          echo "Tag: $tag"
          echo "First line: $first_line"

          # Check format: must start with vX.X.X
          if ! [[ "$first_line" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::RELEASE_NOTES.md must start with vX.X.X"
            exit 1
          fi
          # remove after vX.X.X (e.g. " - fixed bug") to compare with tag
          first_line=$(echo "$first_line" | sed -E 's/^(v[0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          # Check it matches the tag exactly
          if [[ "$first_line" != "$tag" ]]; then
            echo "::error::RELEASE_NOTES.md version ($first_line) does not match tag ($tag)"
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: dist/*
